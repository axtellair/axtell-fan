<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXTELL FAN — Industrial-Grade Ceiling & Mobile Fans</title>
  <meta name="description" content="AXTELL FAN manufactures industrial ceiling fans, mobile fans, and accessories. Massive coverage, low noise, energy efficient.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ---------- Reset & base ---------- */
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;scroll-padding-top:72px}
    body{font-family:'Inter',sans-serif;background:#1f3a52;color:#fff;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    img{max-width:100%;display:block}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    ul{list-style:none}
    :focus-visible{outline:2px solid #f5c542;outline-offset:3px;border-radius:4px}
    :root{--bg-dark:#1f3a52;--bg-dark-2:#28486a;--bg-dark-3:#335880;--bg-light:#f5f7fa;--bg-light-2:#fff;--accent:#f5c542;--accent-dark:#e0a82e;--accent-soft:rgba(245,197,66,0.16);--text-light:#fff;--text-light-2:#d8e4f0;--text-light-3:#a4b5c7;--text-dark:#1a1a2e;--text-dark-2:#4a5563;--border-dark:rgba(255,255,255,0.14);--border-light:#e3e8ef;--shadow-lg:0 24px 60px -20px rgba(0,0,0,0.55);--shadow-md:0 12px 30px -12px rgba(0,0,0,0.35);--radius-lg:18px;--radius-md:12px;--radius-sm:8px;--header-h:72px;--maxw:1200px;--ease:cubic-bezier(0.22,1,0.36,1)}
    .container{width:100%;max-width:var(--maxw);margin:0 auto;padding:0 24px}
    .section{padding:96px 0;position:relative}
    .section--light{background:var(--bg-light);color:var(--text-dark)}
    .section--dark{background:var(--bg-dark-2);color:var(--text-light)}
    .section-head{max-width:720px;margin:0 auto 56px;text-align:center}
    .section-head .eyebrow{display:inline-block;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
    .section-head h2{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.15;margin-bottom:16px}
    .section-head p{font-size:17px;color:var(--text-dark-2)}
    .section--dark .section-head p{color:var(--text-light-2)}
    .text-accent{color:var(--accent)}

    /* ---------- Buttons ---------- */
    .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;transition:all .25s var(--ease);white-space:nowrap}
    .btn--primary{background:var(--accent);color:var(--bg-dark)}
    .btn--primary:hover{background:var(--accent-dark);transform:translateY(-2px);box-shadow:0 10px 24px -8px rgba(232,184,48,0.5)}
    .btn--ghost{border:1.5px solid rgba(255,255,255,0.4);color:var(--text-light)}
    .btn--ghost:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
    .btn--dark{background:var(--bg-dark);color:var(--text-light)}
    .btn--dark:hover{background:#0d1820;transform:translateY(-2px)}

    /* ---------- Animations ---------- */
    .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
    .reveal.in{opacity:1;transform:none}
    .reveal[data-delay="1"]{transition-delay:.08s}
    .reveal[data-delay="2"]{transition-delay:.16s}
    .reveal[data-delay="3"]{transition-delay:.24s}
    .reveal[data-delay="4"]{transition-delay:.32s}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes highlightPulse{0%{box-shadow:inset 0 0 0 0 rgba(245,197,66,0.4)}50%{box-shadow:inset 0 0 0 4px rgba(245,197,66,0.6)}100%{box-shadow:inset 0 0 0 0 rgba(245,197,66,0)}}
    @media(prefers-reduced-motion:reduce){.fan-blades,.spinner{animation:none}.scroll-cue .mouse::after{animation:none}.reveal{opacity:1;transform:none;transition:none}html{scroll-behavior:auto}}

    /* ---------- Header ---------- */
    .header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header-h);display:flex;align-items:center;background:transparent;transition:background .35s var(--ease),box-shadow .35s var(--ease);border-bottom:1px solid transparent}
    .header.scrolled{background:rgba(22,36,47,0.85);backdrop-filter:blur(14px);border-bottom-color:var(--border-dark);box-shadow:0 6px 24px -12px rgba(0,0,0,0.6)}
    .nav{display:flex;align-items:center;justify-content:space-between;width:100%}
    .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:20px;letter-spacing:1px}
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AXTELL FAN — Industrial-Grade Ceiling & Mobile Fans</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <script type="module" src="/src/main.js"></script>
      </head>
      <body>
        <div id="app"></div>
      </body>
    </html>
